version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bizsearch-db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bizsearch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  bizsearch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bizsearch-app
    restart: always
    depends_on:
      - db
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/bizsearch?schema=public
      - SESSION_SECRET=production_secret_bizsearch_2026
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Run migrations before starting
    command: sh -c "npx prisma db push && node server.js"

volumes:
  pgdata:


