version: '3.8'

services:
  bizsearch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bizsearch-app
    restart: always
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      # SQLite database resides inside a mounted volume for reliable persistence on host side
      - DATABASE_URL=file:/app/data/dev.db
      - SESSION_SECRET=production_secret_should_be_highly_secure_change_me_987654321
      - GEMINI_API_KEY=your_gemini_api_key_here
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
    volumes:
      - ./data_store:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
