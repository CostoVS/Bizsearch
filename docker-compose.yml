version: '3.8'

services:
  bizsearch:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bizsearch-app
    restart: always
    ports:
      - "3004:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/dev.db
      - SESSION_SECRET=production_secret_bizsearch_2026
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OLLAMA_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
    volumes:
      - ./data_store:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"

  studio-builder:
    # Studio Builder was requested to be fixed on port 3003
    # Removing 'agent-anythingllm' as it was deemed 'shit' by the user
    image: node:20-alpine
    container_name: studio-builder
    restart: always
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
    command: sh -c "echo 'Studio Builder Active on 3003'; sleep infinity"

  agent-ollama:
    image: ollama/ollama:latest
    container_name: agent-ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
